bio: |
  I studied Computer Science at IIT Tirupati and have been working as a
  Data Engineer for about two years. My day-to-day involves writing
  ingestion pipelines, setting up data quality checks, and building
  monitoring dashboards.

  On my own time, I've been exploring ML — trying out anomaly detection
  on time-series data, building a small forecasting pipeline, and
  experimenting with LangChain and LLM APIs. I'm looking for roles
  where data engineering and ML work are closer together.

